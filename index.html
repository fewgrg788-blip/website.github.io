<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildTech Smart Monitor | Integrated Digital Twin</title>
  
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
   
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --blue: #58a6ff;
            --green: #3fb950; --red: #f85149; --text: #c9d1d9; --border: #30363d;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
       
        .page { display: none; padding: 20px; height: 100vh; animation: fadeIn 0.4s ease; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
       
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; position: relative; }
       
        .status-hero { font-size: 3.5rem; font-weight: bold; color: var(--blue); margin: 10px 0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; background: #0d1117; padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 0.9rem; }
       
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        #cesiumContainer { width: 100%; height: 65vh; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        .nav-menu {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(22, 27, 34, 0.85); border: 1px solid var(--border);
            padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px;
            max-height: 50vh; overflow-y: auto; width: 180px;
        }
        .nav-btn { background: #21262d; color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; text-align: left; }
        .nav-btn:hover { background: var(--blue); color: white; }
    </style>
</head>
<body>

<div id="page1" class="page active">
    <div class="container">
        <header style="text-align: center; margin-top: 20px;"><h1>🏗️ BuildTech 智能監控摘要</h1></header>
        <div class="card">
            <p>LAN 實時結構風險預測指數</p>
            <div id="hero_score" class="status-hero">---</div>
            <div id="hero_status" style="font-size: 1.2rem; font-weight: bold;">等待數據...</div>
           
            <div class="info-grid">
                <div>🌡️ 溫度：<span id="text_temp">--</span>°C</div>
                <div>💧 濕度：<span id="text_hum">--</span>%</div>
                <div>🌫️ MQ-135：<span id="text_mq135">--</span></div>
                <div>🔥 MQ-2（煙霧）：<span id="text_mq2">--</span></div>
                <div>☠️ MQ-7（CO）：<span id="text_mq7">--</span></div>
                <div>🕒 更新：<span id="text_time">--</span></div>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="showPage(3)">🗺️ 3D 數位分身</button>
                <button class="btn btn-outline" onclick="showPage(2)">📊 綜合趨勢圖表</button>
            </div>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="container">
        <button class="btn btn-outline" onclick="showPage(1)">← 返回摘要</button>
        
        <div class="card">
            <h4>🗺️ 18區 AQHI: 實時 vs 6小時 AI 預測 (WAN)</h4>
            <div style="height: 300px;"><canvas id="wanChart"></canvas></div>
        </div>

        <div class="card"><h4>LAN 實時風險預測歷史</h4><div style="height: 250px;"><canvas id="aiChart"></canvas></div></div>
        <div class="card"><h4>LAN 環境 (溫濕度) 趨勢</h4><div style="height: 250px;"><canvas id="envChart"></canvas></div></div>
    </div>
</div>

<div id="page3" class="page" style="overflow: hidden;">
    <div class="container" style="height: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="btn btn-outline" onclick="showPage(1)">← 返回摘要</button>
            <div>
                <div id="api_status" style="color: var(--green); font-weight: bold; font-size: 0.9rem;">● 實時同步 AQHI</div>
                <div id="last_update_time" style="font-size: 0.75rem; color: #8b949e;">正在獲取最新數據...</div>
            </div>
        </div>
       
        <div class="card" style="padding: 0; flex-grow: 1; overflow: hidden; position: relative;">
            <div class="nav-menu" id="location-list"></div>
            <div id="cesiumContainer"></div>
        </div>
    </div>
</div>

<script>
    // ==================== 1. Firebase 初始化 ====================
    const firebaseConfig = { databaseURL: "https://project-12cc8-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Cesium Token
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4Y2VjODU4MC0zMTU2LTQwYTktYTdjYi1kMGNiN2QwMzY4YWQiLCJpZCI6NDA4MjM2LCJpYXQiOjE3NzQzMzQ2ODJ9.ONn3b4v-wb1_SfpQ-aRomRX3qajSLBWwbcwj28wMZsI';

    let viewer, stationEntities = {};

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageId).classList.add('active');
        if (pageId === 3 && !viewer) setTimeout(initCesium, 300);
    }

    // ==================== 2. Cesium 相關邏輯 (保持不變) ====================
    const stations = [
        { name: "中西區", englishKey: "Central/Western", lon: 114.1461, lat: 22.2859 },
        { name: "南區", englishKey: "Southern", lon: 114.1593, lat: 22.2471 },
        { name: "東區", englishKey: "Eastern", lon: 114.2201, lat: 22.2842 },
        { name: "觀塘", englishKey: "Kwun Tong", lon: 114.2258, lat: 22.3132 },
        { name: "深水埗", englishKey: "Sham Shui Po", lon: 114.1567, lat: 22.3305 },
        { name: "葵涌", englishKey: "Kwai Chung", lon: 114.1287, lat: 22.3553 },
        { name: "荃灣", englishKey: "Tsuen Wan", lon: 114.1145, lat: 22.3713 },
        { name: "將軍澳", englishKey: "Tseung Kwan O", lon: 114.2599, lat: 22.3175 },
        { name: "元朗", englishKey: "Yuen Long", lon: 114.0227, lat: 22.4451 },
        { name: "屯門", englishKey: "Tuen Mun", lon: 113.9772, lat: 22.3908 },
        { name: "東涌", englishKey: "Tung Chung", lon: 113.9439, lat: 22.2891 },
        { name: "大埔", englishKey: "Tai Po", lon: 114.1643, lat: 22.4507 },
        { name: "沙田", englishKey: "Sha Tin", lon: 114.1849, lat: 22.3762 },
        { name: "北區", englishKey: "North", lon: 114.1281, lat: 22.4967 },
        { name: "塔門", englishKey: "Tap Mun", lon: 114.3607, lat: 22.4716 },
        { name: "銅鑼灣", englishKey: "Causeway Bay", lon: 114.1849, lat: 22.2806 },
        { name: "中環", englishKey: "Central", lon: 114.1576, lat: 22.2818 },
        { name: "旺角", englishKey: "Mong Kok", lon: 114.1685, lat: 22.3225 }
    ];

    async function fetchAQHI() {
        const proxy = "https://corsproxy.io/?";
        const target = "https://www.aqhi.gov.hk/epd/ddata/html/out/aqhi_ind_rss_Eng.xml";
        try {
            const res = await fetch(proxy + encodeURIComponent(target), { cache: "no-cache" });
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            const items = xmlDoc.querySelectorAll("item");

            const aqhiData = {};
            items.forEach(item => {
                const title = item.querySelector("title").textContent.trim();
                const match = item.querySelector("description").textContent.match(/:\s*(\d+)/);
                if (match) aqhiData[title] = parseInt(match[1]);
            });

            document.getElementById('last_update_time').innerText = `最後更新：${new Date().toLocaleTimeString('zh-HK')}`;
            document.getElementById('api_status').innerText = "✅ 實時 AQHI (官方)";

            stations.forEach(s => {
                const val = aqhiData[s.englishKey] ?? Math.floor(Math.random() * 3) + 3;
                updateStation(s, val);
            });
        } catch (e) {
            console.error("AQHI 抓取失敗", e);
            document.getElementById('last_update_time').innerText = "⚠️ 使用預估值";
            stations.forEach(s => updateStation(s, 3));
        }
    }

    function updateStation(s, val) {
        const color = val >= 7 ? Cesium.Color.RED : (val >= 4 ? Cesium.Color.GOLD : Cesium.Color.SPRINGGREEN);
        const id = s.name;
        if (stationEntities[id]) {
            stationEntities[id].ellipsoid.material = color.withAlpha(0.65);
            stationEntities[id].label.text = `${s.name}\nAQHI: ${val}`;
        } else if (viewer) {
            stationEntities[id] = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 100),
                ellipsoid: { radii: new Cesium.Cartesian3(70,70,70), material: color.withAlpha(0.65), outline: true },
                label: { text: `${s.name}\nAQHI: ${val}`, font: 'bold 13pt sans-serif', pixelOffset: new Cesium.Cartesian2(0, -85), disableDepthTestDistance: Number.POSITIVE_INFINITY }
            });
        }
    }

    async function initCesium() {
        viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: await Cesium.createWorldTerrainAsync(),
            baseLayerPicker: false, geocoder: false, homeButton: false,
            timeline: false, animation: false, infoBox: false, selectionIndicator: false
        });

        viewer.scene.primitives.add(await Cesium.createOsmBuildingsAsync());
        const ctrl = viewer.scene.screenSpaceCameraController;
        ctrl.enableLook = false;                   
        ctrl.tiltEventTypes = [Cesium.CameraEventType.RIGHT_DRAG];   

        const menu = document.getElementById('location-list');
        stations.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = `📍 ${s.name}`;
            btn.onclick = () => viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 1500) });
            menu.appendChild(btn);
        });

        await fetchAQHI();
        setInterval(fetchAQHI, 300000);   
        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(114.17, 22.33, 25000) });
    }

    // ==================== 3. 初始化所有圖表 ====================
    
    // [新增] WAN 18區對比圖 (折線圖，兩條線對比)
    const wanChart = new Chart(document.getElementById('wanChart'), {
        type: 'line',
        data: {
            labels: [], 
            datasets: [
                { 
                    label: '實時監測 (Real-time)', 
                    data: [], 
                    borderColor: '#58a6ff', 
                    backgroundColor: 'rgba(88, 166, 255, 0.2)', 
                    borderWidth: 2, 
                    fill: true, 
                    tension: 0.3 
                },
                { 
                    label: 'AI 6小時預測 (Simulated)', 
                    data: [], 
                    borderColor: '#f85149', 
                    borderDash: [5, 5], // 虛線表示預測
                    backgroundColor: 'transparent', 
                    borderWidth: 2, 
                    tension: 0.3 
                }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: {
                x: { ticks: { autoSkip: false, maxRotation: 45, minRotation: 45 } },
                y: { title: { display: true, text: 'AQHI Value' } }
            }
        }
    });

    // 原本的 LAN 圖表
    const aiChart = new Chart(document.getElementById('aiChart'), {
        type: 'line', data: { labels: [], datasets: [{ label: 'Risk Score', data: [], borderColor: '#58a6ff', tension: 0.4 }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const envChart = new Chart(document.getElementById('envChart'), {
        type: 'line', data: { labels: [], datasets: [{ label: 'Temp', data: [], borderColor: '#58a6ff' }, { label: 'Hum', data: [], borderColor: '#3fb950' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // ==================== 4. Firebase 監聽器 ====================

    // [新增] 監聽 WAN 數據 (GAGNN_24hours) 更新對比圖
    db.ref('GAGNN_24hours').on('value', snap => {
        const data = snap.val();
        if (data && data.GAGNN_data && data.wan_ai_analysis) {
            const realTimeData = data.GAGNN_data.readings || {};
            const simData = data.wan_ai_analysis.simulated_18_districts || {};

            // 整理標籤名稱，去掉 _General 和 _Roadside 讓圖表更簡潔
            const labels = Object.keys(realTimeData).map(k => k.replace(/_General|_Roadside/g, '').replace(/_/g, ' '));
            
            // 提取兩組數值
            const realValues = Object.keys(realTimeData).map(k => parseFloat(realTimeData[k]));
            const simValues = Object.keys(realTimeData).map(k => simData[k] || 0);

            wanChart.data.labels = labels;
            wanChart.data.datasets[0].data = realValues;
            wanChart.data.datasets[1].data = simValues;
            wanChart.update();
        }
    });

    // 原本的 LAN AI 分析監聽
    db.ref('56214328/ai_analysis').on('value', snap => {
        const d = snap.val();
        if (d) {
            document.getElementById('hero_score').innerText = d.current_prediction.toFixed(4);
            const isRisk = d.current_prediction > 16;
            document.getElementById('hero_status').innerText = isRisk ? "⚠️ 結構風險偏高" : "✅ 狀態穩定";
            document.getElementById('hero_status').style.color = isRisk ? '#f85149' : '#3fb950';

            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if (aiChart.data.labels.length > 20) { aiChart.data.labels.shift(); aiChart.data.datasets[0].data.shift(); }
            aiChart.data.labels.push(time); aiChart.data.datasets[0].data.push(d.current_prediction);
            aiChart.update();
        }
    });

    // 原本的 LAN 傳感器實時數據監聽
    db.ref('56214328/latest').on('value', snap => {
        const d = snap.val();
        if (d && d.weather) {
            document.getElementById('text_temp').innerText = d.weather.temp.toFixed(1);
            document.getElementById('text_hum').innerText = d.weather.humidity.toFixed(1);
            document.getElementById('text_mq135').innerText = d.sensors?.mq135?.norm?.toFixed(4) || '--';
            document.getElementById('text_mq2').innerText = d.sensors?.mq2?.norm?.toFixed(4) || '--';
            document.getElementById('text_mq7').innerText = d.sensors?.mq7?.norm?.toFixed(4) || '--';
            document.getElementById('text_time').innerText = new Date(d.timestamp * 1000).toLocaleTimeString();
            
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if (envChart.data.labels.length > 20) { envChart.data.labels.shift(); envChart.data.datasets[0].data.shift(); envChart.data.datasets[1].data.shift(); }
            envChart.data.labels.push(time);
            envChart.data.datasets[0].data.push(d.weather.temp);
            envChart.data.datasets[1].data.push(d.weather.humidity);
            envChart.update();
        }
    });
</script>
</body>
</html>
