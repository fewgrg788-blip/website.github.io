<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildTech Smart Monitor | Proactive Digital Twin</title>
  
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
   
    <style>
        :root {
            --bg: #0d1117; --card: rgba(22, 27, 34, 0.8); --blue: #58a6ff;
            --green: #3fb950; --red: #f85149; --text: #c9d1d9; --border: #30363d;
            --warn: #d29922;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; height: 100vh; 
            overflow: hidden; transition: background 0.5s ease;
        }
        
        /* 頂部全局警告條 */
        #alert-banner {
            display: none; background: var(--red); color: white;
            text-align: center; padding: 8px; font-weight: bold;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        .page { display: none; padding: 20px; height: 100vh; animation: fadeIn 0.4s ease; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
       
        .container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 16px; padding: 24px; text-align: center; 
            backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
       
        .status-hero { font-size: 3.8rem; font-weight: 800; color: var(--blue); margin: 5px 0; text-shadow: 0 0 20px rgba(88,166,255,0.3); }
        .info-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; text-align: left; background: rgba(0,0,0,0.3); 
            padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 0.85rem; 
        }
       
        .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 10px; }
        .btn { 
            background: var(--blue); color: white; border: none; padding: 12px 24px; 
            border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(88,166,255,0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        #cesiumContainer { width: 100%; height: 70vh; border-radius: 16px; border: 1px solid var(--border); }
        
        /* 側邊菜單優化 */
        .nav-menu {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(13, 17, 23, 0.9); border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; width: 160px; max-height: 60vh; overflow-y: auto;
        }
        .nav-btn { 
            background: #21262d; color: var(--text); border: 1px solid var(--border); 
            padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; 
            margin-bottom: 5px; width: 100%; transition: 0.2s;
        }
        .nav-btn:hover { background: var(--blue); border-color: var(--blue); }
    </style>
</head>
<body>

<div id="alert-banner">🚨 系統警告：檢測到高風險空氣污染預測 (GNN Warning)</div>

<div id="page1" class="page active">
    <div class="container">
        <header style="text-align: center;">
            <h1 style="margin-bottom: 5px;">🏗️ BuildTech 數位分身中心</h1>
            <p style="color: #8b949e; margin-top: 0;">AI 輔助結構與環境監控系統</p>
        </header>
        
        <div class="card">
            <span style="font-size: 0.8rem; color: #8b949e; letter-spacing: 1px;">LAN 實時結構風險預估</span>
            <div id="hero_score" class="status-hero">---</div>
            <div id="hero_status" style="font-size: 1.1rem; font-weight: bold;">等待系統連結...</div>
           
            <div class="info-grid">
                <div>🌡️ 溫度：<span id="text_temp">--</span>°C</div>
                <div>💧 濕度：<span id="text_hum">--</span>%</div>
                <div>🌫️ MQ-135：<span id="text_mq135">--</span></div>
                <div>🔥 MQ-2：<span id="text_mq2">--</span></div>
                <div>🕒 最後更新：<span id="text_time">--</span></div>
            </div>
            
            <div class="btn-group">
                <button class="btn" onclick="showPage(3)">🗺️ 3D 虛擬現場</button>
                <button class="btn btn-outline" onclick="showPage(2)">📊 數據深度分析</button>
            </div>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="container">
        <button class="btn btn-outline" onclick="showPage(1)">← 返回主控台</button>
        <div class="card">
            <h4>🗺️ WAN 廣域網預測：18區 AQHI 趨勢 (GNN 模型)</h4>
            <div style="height: 320px;"><canvas id="wanChart"></canvas></div>
            <p style="font-size: 0.75rem; color: #8b949e; margin-top: 10px;">* 紅色虛線代表 GNN 模型對未來 6 小時的預測軌跡</p>
        </div>
        <div class="card"><h4>LAN 風險預測歷史</h4><div style="height: 250px;"><canvas id="aiChart"></canvas></div></div>
    </div>
</div>

<div id="page3" class="page" style="overflow: hidden;">
    <div class="container" style="height: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button class="btn btn-outline" onclick="showPage(1)">← 退出 3D 模式</button>
            <div style="text-align: right;">
                <div id="api_status" style="color: var(--green); font-weight: bold;">● 雲端 AI 同步中</div>
                <div id="last_update_time" style="font-size: 0.7rem; color: #8b949e;">正在加載香港 3D 模型...</div>
            </div>
        </div>
        <div class="card" style="padding: 0; flex-grow: 1; overflow: hidden; position: relative; height: 75vh;">
            <div class="nav-menu" id="location-list"></div>
            <div id="cesiumContainer"></div>
        </div>
    </div>
</div>

<script>
    // ==================== 1. 初始化與配置 ====================
    const firebaseConfig = { databaseURL: "https://project-12cc8-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4Y2VjODU4MC0zMTU2LTQwYTktYTdjYi1kMGNiN2QwMzY4YWQiLCJpZCI6NDA4MjM2LCJpYXQiOjE3NzQzMzQ2ODJ9.ONn3b4v-wb1_SfpQ-aRomRX3qajSLBWwbcwj28wMZsI';

    let viewer = null;
    let stationEntities = {};

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageId).classList.add('active');
        if (pageId === 3 && !viewer) initCesium();
    }

    // ==================== 2. Cesium 3D 邏輯 ====================
    const stations = [
        { name: "中西區", englishKey: "Central/Western", lon: 114.1461, lat: 22.2859 },
        { name: "觀塘", englishKey: "Kwun Tong", lon: 114.2258, lat: 22.3132 },
        { name: "元朗", englishKey: "Yuen Long", lon: 114.0227, lat: 22.4451 },
        { name: "屯門", englishKey: "Tuen Mun", lon: 113.9772, lat: 22.3908 },
        { name: "銅鑼灣", englishKey: "Causeway Bay", lon: 114.1849, lat: 22.2806 },
        { name: "旺角", englishKey: "Mong Kok", lon: 114.1685, lat: 22.3225 }
        // ... 其他站點可自行補回
    ];

    async function initCesium() {
        if (viewer) return;
        viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: await Cesium.createWorldTerrainAsync(),
            baseLayerPicker: false, infoBox: false, selectionIndicator: false,
            timeline: false, animation: false, navigationHelpButton: false
        });

        viewer.scene.primitives.add(await Cesium.createOsmBuildingsAsync());
        
        // 渲染站點
        stations.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = `📍 ${s.name}`;
            btn.onclick = () => viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 1500) });
            document.getElementById('location-list').appendChild(btn);
            
            stationEntities[s.name] = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 80),
                ellipsoid: { radii: new Cesium.Cartesian3(60,60,60), material: Cesium.Color.SPRINGGREEN.withAlpha(0.6) },
                label: { text: s.name, font: '12pt sans-serif', pixelOffset: new Cesium.Cartesian2(0, -50) }
            });
        });

        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(114.17, 22.33, 20000) });
    }

    // ==================== 3. 圖表初始化 ====================
    const wanChart = new Chart(document.getElementById('wanChart'), {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: '實時監測', data: [], borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.1)', fill: true, tension: 0.3 },
                { label: 'AI 6小時預測', data: [], borderColor: '#f85149', borderDash: [5, 5], tension: 0.3 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const aiChart = new Chart(document.getElementById('aiChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: '結構風險指數', data: [], borderColor: '#58a6ff', tension: 0.4 }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // ==================== 4. Firebase 實時監聽 ====================
    
    // 監聽全局 AI 預測狀態
    db.ref('GAGNN_24hours/wan_ai_analysis').on('value', snap => {
        const data = snap.val();
        if (data) {
            const isHazard = data.status === "Hazardous";
            document.getElementById('alert-banner').style.display = isHazard ? 'block' : 'none';
            document.body.style.background = isHazard ? '#1a0d0d' : '#0d1117'; // 危險時背景變微紅
            
            // 更新 WAN 圖表
            if (data.simulated_18_districts) {
                const sim = data.simulated_18_districts;
                wanChart.data.datasets[1].data = Object.values(sim);
                wanChart.update();
            }
        }
    });

    // 監聽實時讀數 (WAN)
    db.ref('GAGNN_24hours/GAGNN_data/readings').on('value', snap => {
        const readings = snap.val();
        if (readings) {
            wanChart.data.labels = Object.keys(readings).map(k => k.split('_')[0]);
            wanChart.data.datasets[0].data = Object.values(readings);
            wanChart.update();
        }
    });

    // 監聽局部設備 (LAN)
    db.ref('56214328/latest').on('value', snap => {
        const d = snap.val();
        if (d) {
            document.getElementById('text_temp').innerText = d.weather?.temp?.toFixed(1) || '--';
            document.getElementById('text_hum').innerText = d.weather?.humidity?.toFixed(1) || '--';
            document.getElementById('text_mq135').innerText = d.sensors?.mq135?.norm?.toFixed(3) || '--';
            document.getElementById('text_mq2').innerText = d.sensors?.mq2?.norm?.toFixed(3) || '--';
            document.getElementById('text_time').innerText = new Date().toLocaleTimeString();
        }
    });

    db.ref('56214328/ai_analysis/current_prediction').on('value', snap => {
        const val = snap.val();
        if (val) {
            document.getElementById('hero_score').innerText = val.toFixed(2);
            const highRisk = val > 16;
            document.getElementById('hero_status').innerText = highRisk ? "⚠️ 結構異常風險" : "✅ 結構運行穩定";
            document.getElementById('hero_status').style.color = highRisk ? 'var(--red)' : 'var(--green)';
            
            // 更新歷史圖表
            const now = new Date().toLocaleTimeString([], {minute:'2-digit', second:'2-digit'});
            if (aiChart.data.labels.length > 15) { aiChart.data.labels.shift(); aiChart.data.datasets[0].data.shift(); }
            aiChart.data.labels.push(now); aiChart.data.datasets[0].data.push(val);
            aiChart.update();
        }
    });
</script>
</body>
</html>
