<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildTech Smart Monitor | Integrated Digital Twin</title>
  
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
   
    <style>
        :root {
            --bg: #0d1117; --card: rgba(22, 27, 34, 0.85); --blue: #58a6ff;
            --green: #3fb950; --red: #f85149; --text: #c9d1d9; --border: #30363d;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        
        /* 頂部警告條 */
        #alert-banner { display: none; background: var(--red); color: white; text-align: center; padding: 8px; font-weight: bold; position: fixed; width: 100%; z-index: 9999; }

        .page { display: none; padding: 20px; height: 100vh; animation: fadeIn 0.4s ease; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
       
        .container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; backdrop-filter: blur(10px); }
       
        .status-hero { font-size: 3.5rem; font-weight: bold; color: var(--blue); margin: 10px 0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 0.9rem; }
       
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        #cesiumContainer { width: 100%; height: 68vh; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        
        /* 18區導航選單 (保持你的滑鼠控制與選擇功能) */
        .nav-menu {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(22, 27, 34, 0.9); border: 1px solid var(--border);
            padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px;
            max-height: 55vh; overflow-y: auto; width: 160px;
        }
        .nav-btn { background: #21262d; color: var(--text); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; text-align: left; }
        .nav-btn:hover { background: var(--blue); color: white; }
    </style>
</head>
<body>

<div id="alert-banner">🚨 GNN 警告：偵測到未來區域性空氣風險偏高</div>

<div id="page1" class="page active">
    <div class="container">
        <header style="text-align: center; margin-top: 10px;"><h1>🏗️ BuildTech 智能監控摘要</h1></header>
        <div class="card">
            <p>LAN 實時結構風險預測指數</p>
            <div id="hero_score" class="status-hero">---</div>
            <div id="hero_status" style="font-size: 1.2rem; font-weight: bold;">數據連接中...</div>
           
            <div class="info-grid">
                <div>🌡️ 溫度：<span id="text_temp">--</span>°C</div>
                <div>💧 濕度：<span id="text_hum">--</span>%</div>
                <div>🌫️ MQ-135：<span id="text_mq135">--</span></div>
                <div>🕒 最後更新：<span id="text_time">--</span></div>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="showPage(3)">🗺️ 18區 3D 數位分身</button>
                <button class="btn btn-outline" onclick="showPage(2)">📊 WAN/LAN 深度趨勢</button>
            </div>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="container">
        <button class="btn btn-outline" onclick="showPage(1)">← 返回摘要</button>
        <div class="card">
            <h4>🗺️ 18區 AQHI: 實時 vs 6小時 AI 預測 (WAN)</h4>
            <div style="height: 300px;"><canvas id="wanChart"></canvas></div>
        </div>
        <div class="card"><h4>LAN 實時風險預測歷史</h4><div style="height: 250px;"><canvas id="aiChart"></canvas></div></div>
    </div>
</div>

<div id="page3" class="page" style="overflow: hidden;">
    <div class="container" style="height: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <button class="btn btn-outline" onclick="showPage(1)">← 返回</button>
            <div style="text-align: right;">
                <div id="api_status" style="color: var(--green); font-weight: bold; font-size: 0.85rem;">● 實時同步 AQHI</div>
                <div id="last_update_time" style="font-size: 0.7rem; color: #8b949e;">數據加載中...</div>
            </div>
        </div>
        <div class="card" style="padding: 0; flex-grow: 1; overflow: hidden; position: relative;">
            <div class="nav-menu" id="location-list"></div>
            <div id="cesiumContainer"></div>
        </div>
    </div>
</div>

<script>
    // ==================== 1. 初始化 ====================
    const firebaseConfig = { databaseURL: "https://project-12cc8-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4Y2VjODU4MC0zMTU2LTQwYTktYTdjYi1kMGNiN2QwMzY4YWQiLCJpZCI6NDA4MjM2LCJpYXQiOjE3NzQzMzQ2ODJ9.ONn3b4v-wb1_SfpQ-aRomRX3qajSLBWwbcwj28wMZsI';

    let viewer = null;
    let stationEntities = {};

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageId).classList.add('active');
        if (pageId === 3 && !viewer) setTimeout(initCesium, 200);
    }

    // ==================== 2. 你的 18 區 3D 地圖與滑鼠控制邏輯 ====================
    const stations = [
        { name: "中西區", englishKey: "Central/Western", lon: 114.1461, lat: 22.2859 },
        { name: "南區", englishKey: "Southern", lon: 114.1593, lat: 22.2471 },
        { name: "東區", englishKey: "Eastern", lon: 114.2201, lat: 22.2842 },
        { name: "觀塘", englishKey: "Kwun Tong", lon: 114.2258, lat: 22.3132 },
        { name: "深水埗", englishKey: "Sham Shui Po", lon: 114.1567, lat: 22.3305 },
        { name: "葵涌", englishKey: "Kwai Chung", lon: 114.1287, lat: 22.3553 },
        { name: "荃灣", englishKey: "Tsuen Wan", lon: 114.1145, lat: 22.3713 },
        { name: "將軍澳", englishKey: "Tseung Kwan O", lon: 114.2599, lat: 22.3175 },
        { name: "元朗", englishKey: "Yuen Long", lon: 114.0227, lat: 22.4451 },
        { name: "屯門", englishKey: "Tuen Mun", lon: 113.9772, lat: 22.3908 },
        { name: "東涌", englishKey: "Tung Chung", lon: 113.9439, lat: 22.2891 },
        { name: "大埔", englishKey: "Tai Po", lon: 114.1643, lat: 22.4507 },
        { name: "沙田", englishKey: "Sha Tin", lon: 114.1849, lat: 22.3762 },
        { name: "北區", englishKey: "North", lon: 114.1281, lat: 22.4967 },
        { name: "塔門", englishKey: "Tap Mun", lon: 114.3607, lat: 22.4716 },
        { name: "銅鑼灣", englishKey: "Causeway Bay", lon: 114.1849, lat: 22.2806 },
        { name: "中環", englishKey: "Central", lon: 114.1576, lat: 22.2818 },
        { name: "旺角", englishKey: "Mong Kok", lon: 114.1685, lat: 22.3225 }
    ];

    async function initCesium() {
        if (viewer) return;
        viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: await Cesium.createWorldTerrainAsync(),
            baseLayerPicker: false, geocoder: false, homeButton: false,
            timeline: false, animation: false, infoBox: false, selectionIndicator: false
        });

        viewer.scene.primitives.add(await Cesium.createOsmBuildingsAsync());
        
        // 滑鼠控制設定 (保持你的操作習慣)
        const ctrl = viewer.scene.screenSpaceCameraController;
        ctrl.enableLook = false;                   
        ctrl.tiltEventTypes = [Cesium.CameraEventType.RIGHT_DRAG];   

        const menu = document.getElementById('location-list');
        stations.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = `📍 ${s.name}`;
            btn.onclick = () => viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 1500) });
            menu.appendChild(btn);
        });

        await fetchAQHI(); // 抓取外部數據
        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(114.17, 22.33, 25000) });
    }

    async function fetchAQHI() {
        const proxy = "https://corsproxy.io/?";
        const target = "https://www.aqhi.gov.hk/epd/ddata/html/out/aqhi_ind_rss_Eng.xml";
        try {
            const res = await fetch(proxy + encodeURIComponent(target));
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
            const items = xmlDoc.querySelectorAll("item");
            const aqhiData = {};
            items.forEach(item => {
                const title = item.querySelector("title").textContent.trim();
                const match = item.querySelector("description").textContent.match(/:\s*(\d+)/);
                if (match) aqhiData[title] = parseInt(match[1]);
            });

            stations.forEach(s => {
                const val = aqhiData[s.englishKey] ?? 3;
                updateStationMarker(s, val);
            });
            document.getElementById('last_update_time').innerText = `最後更新：${new Date().toLocaleTimeString()}`;
        } catch (e) { console.error("AQHI Fetch Error"); }
    }

    function updateStationMarker(s, val) {
        const color = val >= 7 ? Cesium.Color.RED : (val >= 4 ? Cesium.Color.GOLD : Cesium.Color.SPRINGGREEN);
        if (stationEntities[s.name]) {
            stationEntities[s.name].ellipsoid.material = color.withAlpha(0.6);
        } else if (viewer) {
            stationEntities[s.name] = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 100),
                ellipsoid: { radii: new Cesium.Cartesian3(70,70,70), material: color.withAlpha(0.6) },
                label: { text: `${s.name}\nAQHI: ${val}`, font: '11pt sans-serif', pixelOffset: new Cesium.Cartesian2(0, -70) }
            });
        }
    }

    // ==================== 3. 圖表與 Firebase 監聽 (保持優化後邏輯) ====================
    const wanChart = new Chart(document.getElementById('wanChart'), {
        type: 'line',
        data: { labels: [], datasets: [
            { label: '實時 (WAN)', data: [], borderColor: '#58a6ff', tension: 0.3 },
            { label: 'GNN 6h 預測', data: [], borderColor: '#f85149', borderDash: [5, 5], tension: 0.3 }
        ]},
        options: { responsive: true, maintainAspectRatio: false }
    });

    const aiChart = new Chart(document.getElementById('aiChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Risk Score', data: [], borderColor: '#58a6ff', tension: 0.4 }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // 監聽 GNN 數據
    db.ref('GAGNN_v2/dashboard').on('value', snap => {
        const d = snap.val();
        if (d) {
            // 更新摘要頁面的最後更新時間 (可選)
            console.log("Dashboard Updated:", d.last_updated);
            // 如果你想在首頁顯示 AI 準確度，可以在這裡添加邏輯
        }
    });

    // 監聽 GNN 預測數據 (從 GAGNN_v2 獲取最新的預測路徑)
    db.ref('GAGNN_v2/predictions').orderByKey().limitToLast(1).on('value', snap => {
        const predictions = snap.val();
        if (predictions) {
            // 獲取時間 Key (例如 "2026-04-09 23:00")
            const timeKey = Object.keys(predictions)[0];
            const predData = predictions[timeKey];
            
            console.log("Loading predictions for:", timeKey);
    
            // 更新圖表：將預測數值存入 datasets[1]
            // 注意：Object.values 會按照字母順序排列站點數據，
            // 確保你的 Python 寫入順序與 STATIONS 列表一致
            wanChart.data.datasets[1].data = Object.values(predData);
            wanChart.update();
            
            // 可選：更新警報條顯示 (根據預測平均值判定)
            const avg = Object.values(predData).reduce((a, b) => a + b, 0) / 18;
            document.getElementById('alert-banner').style.display = avg > 4.5 ? 'block' : 'none';
            if (avg > 4.5) document.getElementById('alert-banner').innerText = `🚨 GNN 警告：${timeKey} 預測風險偏高`;
        }
    });

    db.ref('GAGNN_24hours/GAGNN_data/readings').on('value', snap => {
        const readings = snap.val();
        if (readings) {
            wanChart.data.labels = Object.keys(readings).map(k => k.split('_')[0]);
            wanChart.data.datasets[0].data = Object.values(readings);
            wanChart.update();
        }
    });

    // 監聽 LAN 實時傳感器
    db.ref('56214328/latest').on('value', snap => {
        const d = snap.val();
        if (d) {
            document.getElementById('text_temp').innerText = d.weather?.temp?.toFixed(1) || '--';
            document.getElementById('text_hum').innerText = d.weather?.humidity?.toFixed(1) || '--';
            document.getElementById('text_mq135').innerText = d.sensors?.mq135?.norm?.toFixed(3) || '--';
            document.getElementById('text_time').innerText = new Date().toLocaleTimeString();
        }
    });

    db.ref('56214328/ai_analysis/current_prediction').on('value', snap => {
        const val = snap.val();
        if (val) {
            document.getElementById('hero_score').innerText = val.toFixed(2);
            document.getElementById('hero_status').innerText = val > 16 ? "⚠️ 結構風險偏高" : "✅ 狀態穩定";
            document.getElementById('hero_status').style.color = val > 16 ? '#f85149' : '#3fb950';
            const time = new Date().toLocaleTimeString([], {minute:'2-digit', second:'2-digit'});
            if (aiChart.data.labels.length > 15) { aiChart.data.labels.shift(); aiChart.data.datasets[0].data.shift(); }
            aiChart.data.labels.push(time); aiChart.data.datasets[0].data.push(val);
            aiChart.update();
        }
    });
</script>
</body>
</html>
