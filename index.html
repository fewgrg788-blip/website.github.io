<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildTech Smart Monitor | Integrated Digital Twin</title>
   
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --blue: #58a6ff; 
            --green: #3fb950; --red: #f85149; --text: #c9d1d9; --border: #30363d; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        
        /* 導航切換 */
        .page { display: none; padding: 20px; height: 100vh; animation: fadeIn 0.4s ease; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; position: relative; }
        
        /* 文字與數值 */
        .status-hero { font-size: 3.5rem; font-weight: bold; color: var(--blue); margin: 10px 0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; background: #0d1117; padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 0.9rem; }
        
        /* 按鈕 */
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        /* 3D 視窗與選單 */
        #cesiumContainer { width: 100%; height: 65vh; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        .nav-menu {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(22, 27, 34, 0.85); border: 1px solid var(--border);
            padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px;
        }
        .nav-btn { background: #21262d; color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; text-align: left; }
        .nav-btn:hover { background: var(--blue); color: white; }
    </style>
</head>
<body>

<div id="page1" class="page active">
    <div class="container">
        <header style="text-align: center; margin-top: 20px;"><h1>🏗️ BuildTech 智能監控摘要</h1></header>
        <div class="card">
            <p>GNN 結構風險預測指數</p>
            <div id="hero_score" class="status-hero">---</div>
            <div id="hero_status" style="font-size: 1.2rem; font-weight: bold;">等待數據...</div>
            
            <div class="info-grid">
                <div>🌡️ 溫度：<span id="text_temp">--</span>°C</div>
                <div>💧 濕度：<span id="text_hum">--</span>%</div>
                <div>🌫️ MQ-135：<span id="text_mq">--</span></div>
                <div>🕒 更新：<span id="text_time">--</span></div>
            </div>

            <div class="btn-group">
                <button class="btn" onclick="showPage(3)">🗺️ 3D 數位分身</button>
                <button class="btn btn-outline" onclick="showPage(2)">📊 趨勢圖表</button>
            </div>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="container">
        <button class="btn btn-outline" onclick="showPage(1)">← 返回摘要</button>
        <div class="card">
            <h4>GNN Risk Prediction History</h4>
            <div style="height: 250px;"><canvas id="aiChart"></canvas></div>
        </div>
        <div class="card">
            <h4>Environment (Temp/Hum) Trend</h4>
            <div style="height: 250px;"><canvas id="envChart"></canvas></div>
        </div>
    </div>
</div>

<div id="page3" class="page" style="overflow: hidden;">
    <div class="container" style="height: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="btn btn-outline" onclick="showPage(1)">← 返回摘要</button>
            <div style="color: var(--green); font-weight: bold; font-size: 0.9rem;">● 3D 實時數據流</div>
        </div>
        
        <div class="card" style="padding: 0; flex-grow: 1; overflow: hidden;">
            <div class="nav-menu">
                <span style="font-size: 0.65rem; color: #8b949e; margin-bottom: 3px;">快速跳轉定位</span>
                <button class="nav-btn" onclick="flyToLocation(114.2258, 22.3132)">📍 觀塘 (K03)</button>
                <button class="nav-btn" onclick="flyToLocation(114.2050, 22.3200)">📍 啟德 (RF025)</button>
                <button class="nav-btn" onclick="flyToLocation(114.1950, 22.3380)">📍 新蒲崗 (K09)</button>
            </div>
            <div id="cesiumContainer"></div>
        </div>
    </div>
</div>

<script>
    // --- 1. 初始化設定 ---
    const firebaseConfig = { databaseURL: "https://project-12cc8-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4Y2VjODU4MC0zMTU2LTQwYTktYTdjYi1kMGNiN2QwMzY4YWQiLCJpZCI6NDA4MjM2LCJpYXQiOjE3NzQzMzQ2ODJ9.ONn3b4v-wb1_SfpQ-aRomRX3qajSLBWwbcwj28wMZsI'; 

    let viewer, monitoringStation;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageId).classList.add('active');
        if (pageId === 3) {
            setTimeout(() => { if (!viewer) initCesium(); else viewer.resize(); }, 300);
        }
    }

    // --- 2. Cesium 3D 邏輯 ---
    async function initCesium() {
        try {
            viewer = new Cesium.Viewer('cesiumContainer', {
                terrainProvider: await Cesium.createWorldTerrainAsync(), 
                baseLayerPicker: false, geocoder: false, homeButton: false,
                navigationHelpButton: false, sceneModePicker: false,
                timeline: false, animation: false, infoBox: true, selectionIndicator: false
            });

            const ctrl = viewer.scene.screenSpaceCameraController;
            ctrl.enableLook = false; // 禁用繞相機轉，讓右鍵繞點轉
            ctrl.translateEventTypes = Cesium.CameraEventType.LEFT_DRAG; // 左鍵平移
            ctrl.tiltEventTypes = [Cesium.CameraEventType.RIGHT_DRAG, Cesium.CameraEventType.PINCH]; // 右鍵旋轉
            ctrl.zoomEventTypes = [Cesium.CameraEventType.WHEEL, Cesium.CameraEventType.PINCH]; // 滾輪縮放

            const buildings = await Cesium.createOsmBuildingsAsync();
            viewer.scene.primitives.add(buildings);

            monitoringStation = viewer.entities.add({
                name: '觀塘實時監測點',
                position: Cesium.Cartesian3.fromDegrees(114.2258, 22.3132, 35),
                ellipsoid: { radii: new Cesium.Cartesian3(45, 45, 45), material: Cesium.Color.GREEN.withAlpha(0.7), outline: true }
            });

            addHKOStations();
            flyToLocation(114.2258, 22.3132); // 初始定位

        } catch (e) { console.error(e); }
    }

    function flyToLocation(lon, lat) {
        if (!viewer) return;
        const center = Cesium.Cartesian3.fromDegrees(lon, lat, 0);
        const hpRange = new Cesium.HeadingPitchRange(Cesium.Math.toRadians(0), Cesium.Math.toRadians(-35), 1200);
        viewer.camera.flyToBoundingSphere(new Cesium.BoundingSphere(center, 0), { offset: hpRange, duration: 1.5 });
    }

    function addHKOStations() {
        const hkoData = [
            { name: "啟德站", lon: 114.2050, lat: 22.3200 },
            { name: "新蒲崗站", lon: 114.1950, lat: 22.3380 }
        ];
        hkoData.forEach(s => {
            viewer.entities.add({
                name: s.name, position: Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 80),
                cylinder: { length: 160, topRadius: 15, bottomRadius: 15, material: Cesium.Color.DEEPSKYBLUE.withAlpha(0.8) }
            });
        });
    }

    // --- 3. 圖表邏輯 (Chart.js) ---
    const chartOpt = (min, max, step) => ({
        responsive: true, maintainAspectRatio: false,
        scales: { y: { min, max, ticks: { stepSize: step, color: '#8b949e' }, grid: { color: '#30363d' } }, x: { ticks: { color: '#8b949e' }, grid: { display: false } } },
        plugins: { legend: { labels: { color: '#c9d1d9' } } },
        animation: false
    });

    const aiChart = new Chart(document.getElementById('aiChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Risk Score', data: [], borderColor: '#58a6ff', fill: true, tension: 0.4 }] },
        options: chartOpt(12, 18, 1)
    });

    const envChart = new Chart(document.getElementById('envChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Temp', data: [], borderColor: '#58a6ff' }, { label: 'Hum', data: [], borderColor: '#3fb950' }] },
        options: chartOpt(0, 100, 10)
    });

    // --- 4. Firebase 數據監聽 ---
    db.ref('56214328/ai_analysis').on('value', snap => {
        const d = snap.val();
        if (d && typeof d.current_prediction === 'number') {
            const score = d.current_prediction;
            document.getElementById('hero_score').innerText = score.toFixed(4);
            const isWarn = score > 16;
            document.getElementById('hero_status').innerText = isWarn ? "⚠️ 結構風險偏高" : "✅ 狀態穩定";
            document.getElementById('hero_status').style.color = isWarn ? '#f85149' : '#3fb950';

            if (monitoringStation) {
                monitoringStation.ellipsoid.material = (isWarn ? Cesium.Color.RED : Cesium.Color.GREEN).withAlpha(0.6);
                const size = 45 + (score - 12) * 10;
                monitoringStation.ellipsoid.radii = new Cesium.Cartesian3(size, size, size);
            }

            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if (aiChart.data.labels.length > 20) { aiChart.data.labels.shift(); aiChart.data.datasets[0].data.shift(); }
            aiChart.data.labels.push(time); aiChart.data.datasets[0].data.push(score);
            aiChart.update('none');
        }
    });

    db.ref('56214328/latest').on('value', snap => {
        const d = snap.val();
        if (d && d.weather) {
            document.getElementById('text_temp').innerText = d.weather.temp.toFixed(1);
            document.getElementById('text_hum').innerText = d.weather.humidity.toFixed(1);
            document.getElementById('text_mq').innerText = d.sensors.mq135.norm.toFixed(4);
            document.getElementById('text_time').innerText = new Date(d.timestamp * 1000).toLocaleTimeString();

            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if (envChart.data.labels.length > 20) { envChart.data.labels.shift(); envChart.data.datasets[0].data.shift(); envChart.data.datasets[1].data.shift(); }
            envChart.data.labels.push(time);
            envChart.data.datasets[0].data.push(d.weather.temp);
            envChart.data.datasets[1].data.push(d.weather.humidity);
            envChart.update('none');
        }
    });
</script>
</body>
</html>
