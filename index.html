<script>
    // --- 頁面切換邏輯 ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageId).classList.add('active');
        window.scrollTo(0,0);
    }

    // --- Firebase 配置 ---
    const firebaseConfig = { 
        databaseURL: "https://project-12cc8-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 圖表共用設定 ---
    const commonOptions = (suggestedMin, suggestedMax, stepSize = 1) => ({
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            y: { 
                suggestedMin: suggestedMin,
                suggestedMax: suggestedMax,
                min: suggestedMin,
                max: suggestedMax,
                ticks: { 
                    stepSize: stepSize, 
                    color: '#8b949e' 
                },
                grid: { color: '#30363d' },
                beginAtZero: false   // 重要：不要從 0 開始，避免壓縮 12-18 範圍
            },
            x: { 
                grid: { display: false }, 
                ticks: { color: '#8b949e' } 
            }
        },
        plugins: { 
            legend: { labels: { color: '#c9d1d9' } } 
        },
        animation: { duration: 0 }  // 關閉動畫，讓更新更即時
    });

    // --- AI 風險分數圖表 (固定 12–18) ---
    const aiCtx = document.getElementById('aiChart').getContext('2d');
    const aiChart = new Chart(aiCtx, {
        type: 'line',
        data: { 
            labels: [], 
            datasets: [{ 
                label: 'GNN Risk Score', 
                data: [], 
                borderColor: '#58a6ff', 
                backgroundColor: 'rgba(88,166,255,0.12)', 
                fill: true, 
                tension: 0.4,
                pointRadius: 3,
                pointBackgroundColor: '#58a6ff'
            }] 
        },
        options: commonOptions(12, 18, 1)  // Y 軸 12–18，每 1 單位一格
    });

    // --- 環境溫濕度圖表 (0–100) ---
    const envCtx = document.getElementById('envChart').getContext('2d');
    const envChart = new Chart(envCtx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { 
                    label: 'Temp (°C)', 
                    data: [], 
                    borderColor: '#58a6ff', 
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#58a6ff'
                },
                { 
                    label: 'Hum (%)', 
                    data: [], 
                    borderColor: '#3fb950', 
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#3fb950'
                }
            ]
        },
        options: commonOptions(0, 100, 10)  // 每 10 單位一格
    });

    // --- 數據監聽 ---
    const MAX_POINTS = 20;

    // AI 分析監聽
    db.ref('56214328/ai_analysis').on('value', snap => {
        const d = snap.val();
        if (d && typeof d.current_prediction === 'number') {
            const score = d.current_prediction;

            // 第一頁更新
            document.getElementById('hero_score').innerText = score.toFixed(4);
            document.getElementById('hero_status').innerText = d.status || 'Normal';
            document.getElementById('hero_status').style.color = 
                (d.status === "Warning" || score > 16) ? "#f85149" : 
                (score > 14) ? "#ffa500" : "#3fb950";

            // 第二頁圖表更新
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if (aiChart.data.labels.length >= MAX_POINTS) {
                aiChart.data.labels.shift();
                aiChart.data.datasets[0].data.shift();
            }
            aiChart.data.labels.push(time);
            aiChart.data.datasets[0].data.push(score);
            aiChart.update('none');
        }
    });

    // 最新環境數據監聽
    db.ref('56214328/latest').on('value', snap => {
        const d = snap.val();
        if (d && d.weather && d.sensors) {
            const t = d.weather.temp;
            const h = d.weather.humidity;
            const mq = d.sensors.mq135.norm;

            // 第一頁文字更新
            document.getElementById('text_temp').innerText = t.toFixed(1);
            document.getElementById('text_hum').innerText = h.toFixed(1);
            document.getElementById('text_mq').innerText = mq.toFixed(4);
            document.getElementById('text_time').innerText = new Date(d.timestamp * 1000).toLocaleTimeString();

            // 第二頁圖表更新
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if (envChart.data.labels.length >= MAX_POINTS) {
                envChart.data.labels.shift();
                envChart.data.datasets[0].data.shift();
                envChart.data.datasets[1].data.shift();
            }
            envChart.data.labels.push(time);
            envChart.data.datasets[0].data.push(t);
            envChart.data.datasets[1].data.push(h);
            envChart.update('none');
        }
    });
</script>
